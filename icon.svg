<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fond ciel provençal -->
  <rect width="128" height="128" fill="#4da6e8"/>
  <!-- Silhouette Sainte-Victoire -->
  <polygon points="0,90 30,50 50,65 70,30 90,55 110,40 128,60 128,90" fill="#b89878"/>
  <!-- Forêt -->
  <rect x="0" y="90" width="128" height="38" fill="#2d6b1e"/>
  <!-- Arbre 1 -->
  <polygon points="20,90 30,60 40,90" fill="#1a4a10"/>
  <!-- Arbre 2 -->
  <polygon points="85,90 95,65 105,90" fill="#1a4a10"/>
  <!-- Flamme (danger) -->
  <ellipse cx="64" cy="75" rx="8" ry="12" fill="#ff6600" opacity="0.9"/>
  <ellipse cx="64" cy="70" rx="5" ry="8" fill="#ffcc00" opacity="0.9"/>
</svg>
